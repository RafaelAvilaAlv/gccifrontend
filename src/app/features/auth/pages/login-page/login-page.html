<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">
      Iniciar sesión
    </h1>
    <p class="text-sm text-gray-500 text-center mb-6">
      Ingresa tus credenciales para continuar
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-lg border border-gray-300 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="correo@ejemplo.com"
        />
        <p
          *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid"
          class="text-sm text-red-500 mt-1"
        >
          Ingresa un correo válido.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg border border-gray-300 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="********"
        />
        <p
          *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid"
          class="text-sm text-red-500 mt-1"
        >
          La contraseña es obligatoria y debe tener al menos 6 caracteres.
        </p>
      </div>

      <p *ngIf="errorMessage" class="text-sm text-red-600">
        {{ errorMessage }}
      </p>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition disabled:opacity-50"
      >
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
